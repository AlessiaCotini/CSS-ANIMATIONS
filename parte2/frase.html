<!DOCTYPE html>
<html lang="it">
	<head>
		<meta charset="utf-8">
		<title>Esempio di testo a rotazione</title>
		<meta name="description" content="Creazione di uno slogan con testo a rotazione sfruttando le animazioni CSS">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="preconnect" href="https://fonts.gstatic.com">
		<link href="https://fonts.googleapis.com/css2?family=Bree+Serif&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="reset.css">
		<link rel="stylesheet" href="frase.css">
	</head>
    <body>
		<main>
			<div id="testoAlternato">
				<p>
					Realizziamo con cura, passione
					<br>
					attenzione, meticolosità, precisione
					<br>
					ed un pizzico di originalità
					<span class="parole">
						<i>interfacce web</i>
						<i>single page app</i>
						<i>app native</i>
					</span>
				</p>
			</div>
		</main>
		<script>

			const items = document.querySelectorAll('.parole i');
let index = 0;

function showNext() {
    items.forEach((item, i) => item.classList.remove('show')); // nasconde tutti
    items[index].classList.add('show');                        // mostra uno
    index = (index + 1) % items.length;                        // passa al prossimo
}
showNext();
setInterval(showNext, 2000);
		</script>
    </body>
</html>
